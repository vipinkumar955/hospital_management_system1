{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 p-4">

<div class="w-full max-w-2xl">

<div class="text-center mb-6">
<div class="inline-flex items-center bg-white/70 px-6 py-3 rounded-full shadow border">
<i class="fas fa-calendar-check text-indigo-500 mr-2"></i>
Appointment Booking
</div>

<h2 class="text-4xl font-extrabold mt-5 bg-gradient-to-r from-indigo-600 to-pink-600 bg-clip-text text-transparent">
Add Appointment
</h2>

<p class="text-gray-500 text-sm mt-2">Book patient appointment</p>
</div>

<div class="bg-white rounded-2xl shadow-xl border p-8">

<form method="POST" class="space-y-6">
{% csrf_token %}

<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

<!-- Doctor Name -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-user-md text-indigo-400"></i>
Doctor Name
</label>

<input type="text" name="doctor_name"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200">
</div>

<!-- Department -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-hospital text-purple-400"></i>
Department
</label>

<input type="text" name="department"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200">
</div>

<!-- Date -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-calendar text-indigo-400"></i>
Appointment Date
</label>

<input type="date" name="appointment_date"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200">
</div>

<!-- Time Slot -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-clock text-pink-400"></i>
Time Slot
</label>

<select name="time_slot"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200">

<option value="">Select Time</option>

<option value="09:00 AM - 10:00 AM">09:00 AM - 10:00 AM</option>
<option value="10:00 AM - 11:00 AM">10:00 AM - 11:00 AM</option>
<option value="11:00 AM - 12:00 PM">11:00 AM - 12:00 PM</option>
<option value="12:00 PM - 01:00 PM">12:00 PM - 01:00 PM</option>
<option value="01:00 PM - 02:00 PM">01:00 PM - 02:00 PM</option>
<option value="02:00 PM - 03:00 PM">02:00 PM - 03:00 PM</option>
<option value="03:00 PM - 04:00 PM">03:00 PM - 04:00 PM</option>
<option value="04:00 PM - 05:00 PM">04:00 PM - 05:00 PM</option>
<option value="05:00 PM - 06:00 PM">05:00 PM - 06:00 PM</option>

</select>
</div>

</div>

<!-- Problem -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-notes-medical text-red-400"></i>
Problem
</label>

<textarea name="problem" rows="3"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200"></textarea>
</div>

<div class="flex justify-between">

<a href="{% url 'Appoinment_List' %}" class="px-6 py-3 bg-gray-200 rounded-xl">
Cancel
</a>

<button type="submit"
class="px-8 py-3 bg-gradient-to-r from-indigo-600 to-pink-600 text-white rounded-xl font-bold">
Submit
</button>

</div>

</form>

</div>
</div>
</div>

{% endblock %}
