{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-indigo-50 py-12 px-4">
    <div class="max-w-4xl mx-auto">

        <!-- Breadcrumb Navigation -->
        <div class="mb-6">
            <nav class="flex items-center space-x-2 text-sm">
                <a href="{% url 'patient_list' %}" class="text-gray-500 hover:text-blue-600 transition flex items-center">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                </a>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
                <a href="{% url 'patient_list' %}" class="text-gray-500 hover:text-blue-600 transition">Patients</a>
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                </svg>
                <span class="text-blue-600 font-medium">{{ patient.name }}</span>
            </nav>
        </div>

        <!-- Patient Profile Card (Center) -->
        <div class="flex justify-center">
            <div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">

                <!-- Gradient Header -->
                <div class="relative bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 px-8 py-12">
                    <div class="absolute inset-0 opacity-20">
                        <div class="absolute w-64 h-64 bg-white rounded-full -top-32 -right-16"></div>
                        <div class="absolute w-48 h-48 bg-white rounded-full -bottom-24 -left-12"></div>
                    </div>

                    <div class="relative z-10 text-center">
                        <!-- Avatar -->
                        <div class="w-32 h-32 mx-auto bg-gradient-to-br from-white to-blue-100 rounded-full flex items-center justify-center shadow-2xl mb-4 ring-4 ring-white/30">
                            <span class="text-6xl font-bold text-blue-600">{{ patient.name|slice:":1"|upper }}</span>
                        </div>
                        <h2 class="text-3xl font-bold text-white mb-2">{{ patient.name }}</h2>
                        <div class="inline-flex items-center px-4 py-2 bg-white/20 backdrop-blur-sm rounded-full">
                            <span class="text-white text-sm font-medium">Patient ID: PT-{{ patient.id|stringformat:"04d" }}</span>
                        </div>
                    </div>
                </div>

                <!-- Patient Info -->
                <div class="p-8 space-y-4">
                    <div class="flex items-center justify-between p-4 bg-gradient-to-r from-blue-50 to-purple-50 rounded-2xl">
                        <p class="text-xs text-gray-500 font-medium uppercase tracking-wide">Age</p>
                        <p class="text-2xl font-bold text-gray-800">{{ patient.age }} <span class="text-sm font-normal text-gray-500">years</span></p>
                    </div>

                    <div class="flex items-center justify-between p-4 bg-gradient-to-r from-green-50 to-emerald-50 rounded-2xl">
                        <p class="text-xs text-gray-500 font-medium uppercase tracking-wide">Status</p>
                        <p class="text-lg font-bold text-green-700">{{patient.status}}</p>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="px-8 pb-8 space-y-3">
                    <a href="{% url 'add_appoinment' %}"
                       class="w-full flex items-center justify-center px-6 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl font-semibold hover:shadow-xl transform hover:scale-105 transition-all duration-200">
                         Add Appointment
                    </a>

                    <button class="w-full flex items-center justify-center px-6 py-3 bg-white border-2 border-gray-200 text-gray-700 rounded-xl font-semibold hover:bg-gray-50 transform hover:scale-105 transition-all duration-200">
                        Edit Profile
                    </button>
                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
