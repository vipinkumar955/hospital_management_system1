{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-indigo-50 py-12 px-4">
<div class="max-w-4xl mx-auto">

<div class="flex justify-center">

<div class="w-full max-w-lg bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">

<!-- Header -->
<div class="relative bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 px-8 py-12">

<div class="relative text-center">

<div class="w-32 h-32 mx-auto bg-white rounded-full flex items-center justify-center shadow-xl mb-4">
<span class="text-5xl font-bold text-blue-600">
{{ patient.name|slice:":1"|upper }}
</span>
</div>

<h2 class="text-3xl font-bold text-white">
{{ patient.name }}
</h2>

<p class="text-white/90 mt-2">
Patient ID : PT-{{ patient.id }}
</p>

</div>
</div>

<!-- Info -->
<div class="p-8 space-y-4">

<div class="flex justify-between p-4 bg-blue-50 rounded-xl">
<p class="text-gray-600 font-semibold">Age</p>
<p class="text-xl font-bold text-gray-800">
{{ patient.age }} years
</p>
</div>

<div class="flex justify-between p-4 bg-green-50 rounded-xl">
<p class="text-gray-600 font-semibold">Status</p>
<p class="text-xl font-bold text-green-700">
{{ patient.status }}
</p>
</div>

<div class="flex justify-between p-4 bg-purple-50 rounded-xl">
<p class="text-gray-600 font-semibold">Gender</p>
<p class="text-xl font-bold text-purple-700">
{{ patient.gender }}
</p>
</div>

</div>

<!-- Actions -->
<div class="px-8 pb-8 space-y-3">

<a href="{% url 'add_appoinment' %}"
class="w-full flex justify-center px-6 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-xl font-semibold hover:scale-105 transition">
Add Appointment
</a>

<a href="{% url 'patient_list' %}"
class="w-full flex justify-center px-6 py-3 border-2 border-gray-200 rounded-xl font-semibold hover:bg-gray-50 transition">
Back
</a>

</div>

</div>
</div>
</div>
</div>

{% endblock %}
