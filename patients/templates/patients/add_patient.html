
{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 p-4">

<div class="w-full max-w-2xl">

<!-- Header -->
<div class="text-center mb-6">
<div class="inline-flex items-center bg-white/70 backdrop-blur-sm px-6 py-3 rounded-full shadow border text-sm">
<i class="fas fa-user-injured text-indigo-500 mr-2"></i>
Patient Registration
</div>

<h2 class="text-4xl font-extrabold mt-4 bg-gradient-to-r from-indigo-600 to-pink-600 bg-clip-text text-transparent">
Add New Patient
</h2>

<p class="text-gray-500 text-sm mt-2">
Fill patient information
</p>
</div>


<!-- CARD -->
<div class="bg-white rounded-2xl shadow-xl border p-8">

<form method="POST" class="space-y-6">
{% csrf_token %}

<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

<!-- Name -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-user text-indigo-400"></i>
Patient Name
</label>

<input type="text" name="name"
value="{{ form.name.value|default:'' }}"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200"
required>
</div>


<!-- Age -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-birthday-cake text-pink-400"></i>
Age
</label>

<input type="number" name="age"
value="{{ form.age.value|default:'' }}"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-200"
required>
</div>


<!-- Gender -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-venus-mars text-purple-400"></i>
Gender
</label>

<select name="gender"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200">

<option value="">Select Gender</option>

<option value="Male"
{% if form.gender.value == "Male" %}selected{% endif %}>
Male
</option>

<option value="Female"
{% if form.gender.value == "Female" %}selected{% endif %}>
Female
</option>

</select>
</div>


<!-- Status -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-heartbeat text-red-400"></i>
Status
</label>

<select name="status"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200">

<option value="">Select Status</option>

<option value="Pending"
{% if form.status.value == "Pending" %}selected{% endif %}>
Pending
</option>

<option value="Complete"
{% if form.status.value == "Complete" %}selected{% endif %}>
Complete
</option>

</select>
</div>

</div>


<!-- Address -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-map-marker-alt text-indigo-400"></i>
Address
</label>

<textarea name="address" rows="3"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200"
required>{{ form.address.value|default:'' }}</textarea>

</div>


<!-- Buttons -->
<div class="pt-5 flex justify-between items-center">

<a href="{% url 'patient_list' %}"
class="px-6 py-3 bg-gray-200 rounded-xl text-gray-700 font-medium">
Cancel
</a>

<button type="submit"
class="px-8 py-3 bg-gradient-to-r from-indigo-600 to-pink-600 text-white rounded-xl font-bold shadow hover:scale-105 transition">
Save Patient
</button>

</div>

</form>

</div>

</div>
</div>

{% endblock %}
