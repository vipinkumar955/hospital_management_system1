
{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 py-12 px-4">

    <!-- Width Reduced -->
    <div class="w-full max-w-3xl">

        <!-- Main Card -->
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">

            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 px-8 py-10">
                <p class="text-white/90 mt-2 text-sm">
                    Fill the details below to  Add Patient
                </p>
            </div>

            <!-- FORM -->
            <form method="POST" class="p-8 space-y-8">
                {% csrf_token %}

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- Patient Name -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Patient Name
                        </label>
                        <input type="text" name="name"
                               value="{{ form.name.value|default:'' }}"
                               class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                               placeholder="Enter patient name"
                               required>
                    </div>

                    <!-- Age -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Age
                        </label>
                        <input type="number" name="age"
                               value="{{ form.age.value|default:'' }}"
                               class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                               placeholder="Enter age"
                               required>
                    </div>

                    <!-- Gender -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Gender
                        </label>
                        <select name="gender"
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                                required>

                            <option value="">Select Gender</option>

                            <option value="Male"
                                {% if form.gender.value == "Male" %}selected{% endif %}>
                                Male
                            </option>

                            <option value="Female"
                                {% if form.gender.value == "Female" %}selected{% endif %}>
                                Female
                            </option>

                        </select>
                    </div>

                    <!-- Status -->
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Status
                        </label>
                        <select name="status"
                                class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
                                required>

                            <option value="">Select Status</option>

                            <option value="Pending"
                                {% if form.status.value == "Pending" %}selected{% endif %}>
                                Pending
                            </option>

                            <option value="Complete"
                                {% if form.status.value == "Complete" %}selected{% endif %}>
                                Complete
                            </option>

                        </select>
                    </div>

                </div>

                <!-- Address Full Width -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Address
                    </label>

                    <textarea name="address" rows="3"
                        class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition resize-none"
                        placeholder="Enter full address"
                        required>{{ form.address.value|default:'' }}</textarea>
                </div>

                <!-- Buttons -->
                <div class="flex flex-col sm:flex-row gap-4 pt-4">

                    <a href="{% url 'patient_list' %}"
                       class="w-full sm:w-auto text-center px-6 py-3 bg-gray-200 text-gray-700 rounded-xl font-semibold hover:bg-gray-300 transition">
                        Cancel
                </a>
                    <button type="submit"
        class="w-full sm:w-auto px-8 py-3 bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-600 text-white rounded-xl font-bold shadow-lg hover:scale-105 transition transform">
    Submit
</button>


                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
