{% extends 'base.html' %}
{% load static %}
{% block content %}

<style>
    /* Input Styling */
    input, select, textarea {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #374151;
        background: rgba(17, 24, 39, 0.7);
        color: white;
        font-family: sans-serif;
        outline: none;
        transition: all 0.2s ease-in-out;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
    }

    /* Label Styling */
    label {
        font-weight: 600;
        color: #d1d5db;
        margin-bottom: 6px;
        display: block;
    }

    /* Form Spacing */
    .form-group {
        margin-bottom: 16px;
    }
</style>

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 via-gray-800 to-black p-4">

    <div class="w-full max-w-lg bg-gray-900/80 backdrop-blur-lg border border-gray-700 rounded-2xl shadow-xl p-6">

        <h2 class="text-xl font-semibold text-center text-blue-400 mb-4 font-sans">
            Schedule
        </h2>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div class="space-y-3">
                {{ form.as_p }}
            </div>

            <button type="submit"
                class="w-full py-2.5 rounded-lg text-white font-medium
                       bg-gradient-to-r from-blue-600 to-purple-600
                       hover:from-blue-700 hover:to-purple-700
                       focus:ring-2 focus:ring-blue-400
                       transition duration-200 shadow-md">
                Save Schedule
            </button>
        </form>

    </div>
</div>

{% endblock %}
