{% extends 'base.html' %}
{% load static %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 p-4">

<div class="w-full max-w-2xl">

<!-- Header -->
<div class="text-center mb-6">
<div class="inline-flex items-center bg-white/70 backdrop-blur-sm px-6 py-3 rounded-full shadow border text-sm">
<i class="fas fa-stethoscope text-indigo-500 mr-2"></i>
Doctor Registration
</div>

<h2 class="text-4xl font-extrabold mt-4 bg-gradient-to-r from-indigo-600 to-pink-600 bg-clip-text text-transparent">
Add New Doctor
</h2>

<p class="text-gray-500 text-sm mt-2">
Fill doctor professional details
</p>
</div>


<!-- CARD -->
<div class="bg-white rounded-2xl shadow-xl border p-8">

<form method="POST" enctype="multipart/form-data" class="space-y-6">
{% csrf_token %}

<div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

<!-- Name -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-user-md text-indigo-400"></i>
Doctor Name
</label>

<input type="text" name="name"
value="{{ form.name.value|default:'' }}"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200"
required>
</div>


<!-- Specialization -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-microscope text-purple-400"></i>
Specialization
</label>

<input type="text" name="specialization"
value="{{ form.specialization.value|default:'' }}"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-400 focus:ring-2 focus:ring-purple-200"
required>
</div>


<!-- Email -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-envelope text-pink-400"></i>
Email
</label>

<input type="email" name="email"
value="{{ form.email.value|default:'' }}"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-200"
required>
</div>


<!-- Phone -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-phone text-indigo-400"></i>
Phone
</label>

<input type="text" name="phone"
value="{{ form.phone.value|default:'' }}"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200"
required>
</div>


<!-- Hospital -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-hospital text-purple-400"></i>
Hospital Office
</label>

<input type="text" name="office"
value="{{ form.office.value|default:'' }}"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-400 focus:ring-2 focus:ring-purple-200"
required>
</div>


<!-- Experience -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-briefcase text-pink-400"></i>
Experience
</label>

<input type="number" name="years_experience"
value="{{ form.years_experience.value|default:'' }}"
class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-pink-400 focus:ring-2 focus:ring-pink-200"
required>
</div>

</div>


<!-- Profile Image -->
<div>
<label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
<i class="fas fa-camera text-indigo-400"></i>
Profile Image
</label>

<input type="file" name="profile_image"
class="w-full px-4 py-3 border-2 border-dashed border-gray-300 rounded-xl">
</div>


<!-- Buttons -->
<div class="pt-5 flex justify-between items-center">

<a href="{% url 'doctor_list' %}"
class="px-6 py-3 bg-gray-200 rounded-xl text-gray-700 font-medium">
Cancel
</a>

<button type="submit"
class="px-8 py-3 bg-gradient-to-r from-indigo-600 to-pink-600 text-white rounded-xl font-bold shadow hover:scale-105 transition">
Save Doctor
</button>

</div>

</form>

</div>

</div>
</div>

{% endblock %}
