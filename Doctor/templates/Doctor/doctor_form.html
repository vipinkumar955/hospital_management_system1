{% extends 'base.html' %}
{% load static %}
{% block content %}


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealSync · Doctor</title>
    <!-- Tailwind + FontAwesome + Inter font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="antialiased min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-purple-50 to-pink-50 p-4 relative overflow-hidden">

<!-- animated blobs (2) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-indigo-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
</div>

<div class="w-full max-w-2xl relative z-10 mx-auto my-auto">
    <!-- header (font sizes increased) -->
    <div class="text-center mb-6">
        <div class="inline-flex items-center bg-white/70 backdrop-blur-sm px-6 py-3 rounded-full shadow-sm border border-white/50 text-base">
            <i class="fas fa-stethoscope text-indigo-500 mr-2"></i> join 2.5k+ specialists
        </div>
        <h2 class="text-4xl font-extrabold mt-5 bg-gradient-to-r from-indigo-600 to-pink-600 bg-clip-text text-transparent">doctor registration</h2>
        <p class="text-gray-500 text-base mt-2">fill professional details</p>
    </div>

    <!-- main card (padding increased for larger feel) -->
    <div class="bg-white/90 backdrop-blur-sm rounded-2xl shadow-xl border border-white/50 p-8">
        <form method="POST" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}

            <!-- grid gap increased slightly -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

                <!-- name (larger text) -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-1"><i class="fas fa-user-md text-indigo-400 text-sm"></i>full name *</label>
                    <input type="text" name="name" value="{{ form.name.value|default:'' }}" placeholder="Dr. Sarah Chen" required
                           class="w-full px-5 py-4 rounded-xl border-2 border-gray-200 bg-white/60 focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 transition-all text-base">
                </div>

                <!-- specialization -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-1"><i class="fas fa-microscope text-purple-400 text-sm"></i>specialization *</label>
                    <input type="text" name="specialization" value="{{ form.specialization.value|default:'' }}" placeholder="Cardiology, Neurology..." required
                           class="w-full px-5 py-4 rounded-xl border-2 border-gray-200 bg-white/60 focus:bg-white focus:border-purple-400 focus:ring-2 focus:ring-purple-200 transition-all text-base">
                </div>

                <!-- email -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-1"><i class="fas fa-envelope text-pink-400 text-sm"></i>email *</label>
                    <input type="email" name="email" value="{{ form.email.value|default:'' }}" placeholder="doctor@hospital.com" required
                           class="w-full px-5 py-4 rounded-xl border-2 border-gray-200 bg-white/60 focus:bg-white focus:border-pink-400 focus:ring-2 focus:ring-pink-200 transition-all text-base">
                </div>

                <!-- phone -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-1"><i class="fas fa-phone-alt text-indigo-400 text-sm"></i>phone *</label>
                    <input type="tel" name="phone" value="{{ form.phone.value|default:'' }}" placeholder="+1 234 567 8900" required
                           class="w-full px-5 py-4 rounded-xl border-2 border-gray-200 bg-white/60 focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-200 transition-all text-base">
                </div>

                <!-- clinic/hospital -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-1"><i class="fas fa-map-marker-alt text-purple-400 text-sm"></i>clinic / hospital *</label>
                    <input type="text" name="office" value="{{ form.office.value|default:'' }}" placeholder="City Medical Center" required
                           class="w-full px-5 py-4 rounded-xl border-2 border-gray-200 bg-white/60 focus:bg-white focus:border-purple-400 focus:ring-2 focus:ring-purple-200 transition-all text-base">
                </div>

                <!-- experience with years suffix -->
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-1"><i class="fas fa-briefcase text-pink-400 text-sm"></i>experience (years) *</label>
                    <div class="relative">
                        <input type="number" name="years_experience" value="{{ form.years_experience.value|default:'' }}" placeholder="12" min="0" max="60" required
                               class="w-full px-5 py-4 rounded-xl border-2 border-gray-200 bg-white/60 focus:bg-white focus:border-pink-400 focus:ring-2 focus:ring-pink-200 transition-all text-base">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">years</span>
                    </div>
                </div>

                <!-- IMAGE FIELD (full width) - increased text size -->
                <div class="space-y-2 sm:col-span-2">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-1"><i class="fas fa-camera text-indigo-400 text-sm"></i>profile photo (optional)</label>
                    <div class="flex items-center gap-4 flex-wrap">
                        <label class="cursor-pointer bg-white border-2 border-dashed border-gray-300 hover:border-indigo-400 rounded-xl px-6 py-4 flex items-center gap-3 text-base text-gray-600 transition hover:bg-indigo-50/30">
                            <i class="fas fa-cloud-upload-alt text-indigo-400 text-lg"></i>
                            <span>choose image</span>
                            <input type="file" name="profile_image" accept="image/*" class="hidden">
                        </label>
                        <span class="text-sm text-gray-400">PNG, JPG (max 5MB)</span>
                    </div>
                </div>
            </div>

            <!-- terms checkbox (larger) -->
            <div class="flex items-start gap-3 pt-3">
                <input type="checkbox" id="terms" class="mt-1 w-5 h-5 rounded border-gray-300 text-indigo-600 focus:ring-indigo-500">
                <label for="terms" class="text-sm text-gray-500">I confirm details are accurate & agree to <a href="#" class="text-indigo-600 hover:underline">terms</a>.</label>
            </div>

            <!-- action row: draft + register (larger buttons) -->
            <div class="pt-5 flex flex-col sm:flex-row items-center justify-between gap-4">
                <button type="button" class="text-base text-gray-500 hover:text-gray-700 font-medium flex items-center gap-2 order-2 sm:order-1">
                    <i class="far fa-save text-lg"></i> draft
                </button>
                <button type="submit" class="w-full sm:w-auto px-10 py-4 bg-gradient-to-r from-indigo-600 to-pink-600 text-white rounded-xl font-bold shadow-md hover:shadow-xl transition-all hover:scale-[1.02] flex items-center justify-center gap-3 text-base order-1 sm:order-2">
                    register now <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </div>

            <!-- mini trust row (slightly larger) -->
            <div class="flex items-center justify-center gap-6 text-xs text-gray-400 pt-4 border-t border-gray-100 mt-3">
                <span><i class="fas fa-lock text-green-400 mr-1"></i>SSL</span>
                <span><i class="fas fa-shield-alt text-indigo-300 mr-1"></i>verified</span>
                <span><i class="fas fa-clock text-purple-300 mr-1"></i>24/7</span>
            </div>
        </form>
    </div>

    <!-- social proof (larger text) -->
    <div class="mt-6 text-center text-sm text-gray-400 flex items-center justify-center gap-4">
        <div class="flex -space-x-2">
            <img src="https://randomuser.me/api/portraits/women/44.jpg" class="w-7 h-7 rounded-full border-2 border-white" alt="doc">
            <img src="https://randomuser.me/api/portraits/men/46.jpg" class="w-7 h-7 rounded-full border-2 border-white" alt="doc">
        </div>
        <span><span class="font-semibold text-indigo-500">2.5k+</span> professionals</span>
    </div>
</div>

<!-- minimal extra style -->
<style>
    input, button, label { transition: all 0.15s ease; }
</style>
</body>
</html>
{% endblock %}
